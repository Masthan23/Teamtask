<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1e1b4b, #4c1d95, #6d28d9);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
            text-align: center;
        }

        .error-code {
            font-size: clamp(6rem, 18vw, 14rem);
            font-weight: 900;
            background: linear-gradient(135deg, #a5b4fc, #c084fc, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            animation: slideDown 0.8s ease both;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-40px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0)
            }

            50% {
                transform: translateY(-12px)
            }
        }

        .icon {
            font-size: 3.5rem;
            margin: 10px 0;
            animation: bounce 2s ease infinite
        }

        h1 {
            font-size: clamp(1.4rem, 3vw, 2rem);
            font-weight: 800;
            margin-bottom: 12px;
            animation: fadeUp 0.8s 0.2s ease both;
        }

        p {
            color: rgba(255, 255, 255, 0.6);
            max-width: 440px;
            line-height: 1.7;
            margin-bottom: 36px;
            animation: fadeUp 0.8s 0.3s ease both;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            animation: fadeUp 0.8s 0.4s ease both;
        }

        a.btn {
            padding: 13px 28px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.92rem;
            text-decoration: none;
            transition: transform 0.25s, box-shadow 0.25s;
        }

        a.btn:hover {
            transform: translateY(-4px)
        }

        .btn-home {
            background: white;
            color: #4f46e5
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.1);
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            color: white
        }

        .links {
            margin-top: 44px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            animation: fadeUp 0.8s 0.5s ease both;
        }

        .links a {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 50px;
            color: rgba(255, 255, 255, 0.75);
            font-size: 0.84rem;
            font-weight: 600;
            text-decoration: none;
            transition: background 0.2s, transform 0.2s;
        }

        .links a:hover {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            transform: translateY(-2px)
        }

        .notice {
            margin-top: 30px;
            font-size: 0.82rem;
            color: rgba(255, 255, 255, 0.4);
            animation: fadeUp 0.8s 0.6s ease both;
        }

        .notice strong {
            color: rgba(255, 255, 255, 0.7)
        }
    </style>
</head>

<body>
    <div class="error-code">404</div>
    <span class="icon">🔍</span>
    <h1>Oops! Page Not Found</h1>
    <p>The page you're looking for doesn't exist or has been moved. You may have typed the wrong URL.</p>

    <div class="btn-group">
        <a href="index.html" class="btn btn-home">🏠 Back to Home</a>
        <a href="javascript:history.back()" class="btn btn-back">← Go Back</a>
    </div>

    <div class="links">
        <a href="index.html">🏠 Home</a>
        <a href="auth.html">🔑 Sign In</a>
        <a href="auth.html?tab=register">✨ Register</a>
        <a href="app.html">📊 Dashboard</a>
    </div>

    <div class="notice">Redirecting to home in <strong id="cd">10</strong>s</div>

    <script>
        let n = 10, el = document.getElementById('cd');
        setInterval(() => { el.textContent = --n; if (!n) location.href = 'index.html' }, 1000);
    </script>
</body>

</html>
